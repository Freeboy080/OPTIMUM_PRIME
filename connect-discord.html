  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }



 body {
    min-height: 100vh;
    /* Layered background: Image first, then your existing gradient */                                                                              background-image: url('background3.png'), radial-gradient(ellipse at top left, #2a2a3d 0%, #1a1a2e 40%, #0d0d1a 100%);
    background-size: cover, auto; /* Image covers, gradient stays standard */
    background-position: center bottom, center;
    background-repeat: no-repeat, no-repeat;
    background-attachment: fixed, fixed;
    background-size: contain;

    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}


    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(192,192,192,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,192,192,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100px); opacity: 0; }
    }
    .particle {
      position: fixed;
      width: 3px; height: 3px;
      background: #C0C0C0;
      border-radius: 50%;
      animation: floatUp linear infinite;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
