<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Optimum Prime</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }


 body {
    min-height: 100vh;
    /* Layered background: Image first, then your existing gradient */
    background-image: url('background3.png'), radial-gradient(ellipse at top left, #2a2a3d 0%, #1a1a2e 40%, #0d0d1a 100%);
    background-size: cover, auto; /* Image covers, gradient stays standard */
    background-position: center bottom, center;
    background-repeat: no-repeat, no-repeat;
    background-attachment: fixed, fixed;
    background-size: contain;
    
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}
   



    /* Animated grid lines */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(192,192,192,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,192,192,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }

    /* Top glow effect */
    body::after {
      content: '';
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(192,192,192,0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* Floating particles */
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    .particle {
      position: fixed;
      width: 3px;
      height: 3px;
      background: #C0C0C0;
      border-radius: 50%;
      animation: floatUp linear infinite;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Floating particles -->

<div class="particle" style="left: 10%; animation-duration: 12s; animation-delay: 0s;"></div>
<div class="particle" style="left: 20%; animation-duration: 18s; animation-delay: 3s; width:2px; height:2px;"></div>
<div class="particle" style="left: 35%; animation-duration: 14s; animation-delay: 6s;"></div>
<div class="particle" style="left: 50%; animation-duration: 20s; animation-delay: 1s; width:4px; height:4px;"></div>
<div class="particle" style="left: 65%; animation-duration: 16s; animation-delay: 4s;"></div>
<div class="particle" style="left: 80%; animation-duration: 11s; animation-delay: 8s; width:2px; height:2px;"></div>
<div class="particle" style="left: 90%; animation-duration: 15s; animation-delay: 2s;"></div>

<!-- Page content goes here -->
<div style="position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">

<!--Optimum logo-->
<div style="position: fixed; top: 20px; left: 20px; z-index: 999;">
  <img src="optimumLogo.png" style="width: 60px; object-fit: contain;">
</div>




<!--Login dashboard-->
<div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(192,192,192,0.2); border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 450px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">

 <!--Optimum logo-->
<div style="text-align: center; margin-bottom: 24px;">
  <img src="optimumLogo2.png" style="width: 100px; object-fit: contain;">
</div>

<!--Login credentials insert-->
<!-- Title -->
<h2 style="font-family: 'Anton', sans-serif; font-size: 1.8em; letter-spacing: 3px; color: white; text-align: center; margin-bottom: 8px;">WELCOME BACK</h2>
<p style="font-family: 'Orbitron', sans-serif; font-size: 0.75em; color: rgba(192,192,192,0.6); text-align: center; letter-spacing: 2px; margin-bottom: 30px;">LOGIN TO YOUR ACCOUNT</p>

<!-- Email input -->
<div style="margin-bottom: 16px;">
  <input type="email" id="emailInput" placeholder="Email address" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
</div>

<!-- Password input -->
<div style="margin-bottom: 24px;">
  <input type="password" id="passwordInput" placeholder="Password" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
</div>

<!-- Login button -->
<button onclick="handleLogin()" style="width: 100%; padding: 14px; background: white; color: #1a1a1a; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.9em; letter-spacing: 2px; font-weight: bold; cursor: pointer; margin-bottom: 20px;">LOGIN</button>

<!-- Divider -->
<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
  <div style="flex: 1; height: 1px; background: rgba(192,192,192,0.2);"></div>
  <p style="font-family: 'Orbitron', sans-serif; font-size: 0.7em; color: rgba(192,192,192,0.5); letter-spacing: 2px;">OR</p>
  <div style="flex: 1; height: 1px; background: rgba(192,192,192,0.2);"></div>
</div>

<!-- Discord button -->
<button onclick="loginWithDiscord()" style="width: 100%; padding: 14px; background: #5865F2; color: white; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.9em; letter-spacing: 2px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
  <img src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" style="width: 24px; height: 24px;">
  LOGIN WITH DISCORD
</button>

<!-- Sign up link -->
<p style="font-family: 'Inter', sans-serif; font-size: 0.85em; color: rgba(192,192,192,0.5); text-align: center; margin-top: 20px;">Don't have an account? <span onclick="showSignup()" style="color: white; cursor: pointer; text-decoration: underline;">Sign up</span></p>

<!-- Error message -->
<p id="loginError" style="font-family: 'Inter', sans-serif; font-size: 0.85em; color: #ff4444; text-align: center; margin-top: 10px; display: none;"></p>








</div>














</div>



<script>

const SUPABASE_URL = 'https://hpjztfiijgkkbexpxxqz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwanp0Zmlpamdra2JleHB4eHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTA4ODUsImV4cCI6MjA5NzIyNjg4NX0.LbS4fFhnFWBg3U2dqV6eVERbX-GG4d0oPk40XKkMLSA';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function handleLogin() {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;
  const errorEl = document.getElementById('loginError');

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = error.message;
    errorEl.style.display = 'block';
  } else {
    window.location.href = 'index.html';
  }
}

function loginWithDiscord() {
  supabaseClient.auth.signInWithOAuth({
    provider: 'discord',
    options: { redirectTo: 'http://localhost:8000/index.html' }
  });
}

function showSignup() {
  window.location.href = 'signup.html';
}






</script>
</body>
</html>
