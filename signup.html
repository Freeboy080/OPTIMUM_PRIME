<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Optimum Prime</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
    min-height: 100vh;
    /* Layered background: Image first, then your existing gradient */                                                                              background-image: url('background3.png'), radial-gradient(ellipse at top left, #2a2a3d 0%, #1a1a2e 40%, #0d0d1a 100%);
    background-size: cover, auto; /* Image covers, gradient stays standard */
    background-position: center bottom, center;
    background-repeat: no-repeat, no-repeat;
    background-attachment: fixed, fixed;
    background-size: contain;

    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}




    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(192,192,192,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,192,192,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100px); opacity: 0; }
    }
    .particle {
      position: fixed;
      width: 3px; height: 3px;
      background: #C0C0C0;
      border-radius: 50%;
      animation: floatUp linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    input::placeholder { color: rgba(192,192,192,0.4); }
  </style>
</head>
<body>

<!-- Particles -->
<div class="particle" style="left: 10%; animation-duration: 12s; animation-delay: 0s;"></div>
<div class="particle" style="left: 25%; animation-duration: 18s; animation-delay: 3s; width:2px; height:2px;"></div>
<div class="particle" style="left: 50%; animation-duration: 14s; animation-delay: 6s;"></div>
<div class="particle" style="left: 70%; animation-duration: 20s; animation-delay: 1s; width:4px; height:4px;"></div>
<div class="particle" style="left: 88%; animation-duration: 16s; animation-delay: 4s;"></div>

<!-- Logo -->
<div style="position: fixed; top: 20px; left: 20px; z-index: 999;">
  <img src="optimumLogo2.png" style="width: 120px; object-fit: contain;">
</div>

<!-- Main content -->
<div style="position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">

  <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(192,192,192,0.2); border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 450px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">

    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 24px;">
      <img src="optimumLogo.png" style="width: 150px; object-fit: contain;">
    </div>

    <!-- Title -->
    <h2 style="font-family: 'Anton', sans-serif; font-size: 1.8em; letter-spacing: 3px; color: white; text-align: center; margin-bottom: 8px;">CREATE ACCOUNT</h2>
    <p style="font-family: 'Orbitron', sans-serif; font-size: 0.75em; color: rgba(192,192,192,0.6); text-align: center; letter-spacing: 2px; margin-bottom: 30px;">JOIN THE BATTLEFIELD</p>

    <!-- Display Name -->
    <div style="margin-bottom: 16px;">
      <input type="text" id="displayName" placeholder="Display name" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
    </div>

    <!-- Email -->
    <div style="margin-bottom: 16px;">
      <input type="email" id="emailInput" placeholder="Email address" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
    </div>

    <!-- Password -->
    <div style="margin-bottom: 16px;">
      <input type="password" id="passwordInput" placeholder="Password" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
    </div>

    <!-- Confirm Password -->
    <div style="margin-bottom: 24px;">
      <input type="password" id="confirmPassword" placeholder="Confirm password" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95em; outline: none;">
    </div>

    <!-- Sign Up button -->
    <button onclick="handleSignup()" style="width: 100%; padding: 14px; background: white; color: #1a1a1a; border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.9em; letter-spacing: 2px; font-weight: bold; cursor: pointer; margin-bottom: 20px;">CREATE ACCOUNT</button>

    <!-- Error message -->
    <p id="signupError" style="font-family: 'Inter', sans-serif; font-size: 0.85em; color: #ff4444; text-align: center; margin-bottom: 10px; display: none;"></p>

    <!-- Login link -->
    <p style="font-family: 'Inter', sans-serif; font-size: 0.85em; color: rgba(192,192,192,0.5); text-align: center;">Already have an account? <a href="login.html" style="color: white; text-decoration: underline;">Login</a></p>

  </div>
</div>

<script>


  const SUPABASE_URL = 'https://hpjztfiijgkkbexpxxqz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwanp0Zmlpamdra2JleHB4eHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTA4ODUsImV4cCI6MjA5NzIyNjg4NX0.LbS4fFhnFWBg3U2dqV6eVERbX-GG4d0oPk40XKkMLSA';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function handleSignup() {
  const displayName = document.getElementById('displayName').value;
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;
  const confirm = document.getElementById('confirmPassword').value;
  const errorEl = document.getElementById('signupError');

  if (!displayName || !email || !password || !confirm) {
    errorEl.textContent = 'Please fill in all fields.';
    errorEl.style.display = 'block';
    return;
  }

  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.style.display = 'block';
    return;
  }

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
    options: { data: { display_name: displayName } }
  });

  if (error) {
    errorEl.textContent = error.message;
    errorEl.style.display = 'block';
  } else {
     window.location.href = 'user-identity.html';
  }
}




</script>

</body>
</html>
